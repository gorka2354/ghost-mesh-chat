<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Mesh Chat</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1b26">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GhostMesh">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Open Graph -->
  <meta property="og:title" content="Ghost Mesh Chat">
  <meta property="og:description" content="Анонимный P2P мессенджер — без серверов, без регистрации, без следов">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icon.svg">
  <meta name="description" content="Анонимный P2P мессенджер на WebRTC. Шифрование, mesh-сеть, передача файлов. Без серверов.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Шапка -->
    <header id="header">
      <span class="logo">ghost-mesh<span class="cursor">_</span></span>
      <div class="header-right">
        <button id="typewriter-toggle" class="icon-btn" title="анимация текста">▸ anim</button>
        <button id="debug-toggle" class="icon-btn" title="debug лог">▸ log</button>
        <span id="my-id" class="my-id">connecting...</span>
      </div>
    </header>

    <!-- Экран подключения -->
    <div id="connect-screen">
      <div class="connect-section">
        <p class="prompt">&gt; создай комнату или подключись к существующей</p>

        <button id="create-room-btn" class="btn-primary">create room</button>

        <div class="divider"><span>или</span></div>

        <p class="prompt-small">&gt; введи ID собеседника:</p>
        <div class="connect-row">
          <input type="text" id="peer-id-input" placeholder="ghost-XXXX" spellcheck="false" autocomplete="off">
          <button id="connect-btn">connect</button>
        </div>
      </div>

      <p class="hint">твой ID: <span id="my-id-copy" class="copyable">...</span></p>
    </div>

    <!-- Экран комнаты (ожидание) -->
    <div id="room-screen" class="hidden">
      <div class="room-info">
        <p class="prompt">&gt; комната создана. отправь ссылку собеседнику:</p>
        <div class="invite-link-row">
          <span id="invite-link" class="copyable">...</span>
          <button id="copy-link-btn">copy</button>
        </div>
        <p class="hint waiting-dots">ожидание подключения</p>
      </div>
    </div>

    <!-- Экран чата -->
    <div id="chat-screen" class="hidden">
      <div id="chat-header">
        <span id="room-id-display"></span>
        <div class="chat-header-right">
          <span id="lock-icon" title="статус шифрования"></span>
          <span id="online-count">0 online</span>
        </div>
      </div>
      <div id="messages"></div>
      <div id="typing-indicator" class="hidden">
        <span class="typing-dots">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </span>
        <span id="typing-nick"></span>
      </div>
      <div id="chat-input-row">
        <label id="file-btn" class="file-label" title="отправить файл">&#x1F4CE;</label>
        <input type="file" id="file-input" class="hidden">
        <input type="text" id="msg-input" placeholder="> сообщение..." spellcheck="false" autocomplete="off">
        <button id="send-btn">send</button>
      </div>
    </div>

    <!-- Debug-панель -->
    <div id="debug-panel" class="hidden">
      <div id="debug-controls">
        <button id="debug-copy" class="icon-btn">copy all</button>
        <button id="debug-clear" class="icon-btn">clear</button>
      </div>
      <div id="debug-log"></div>
    </div>

    <!-- Статус-бар -->
    <footer id="status-bar">
      <span id="status">[ offline ]</span>
    </footer>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
